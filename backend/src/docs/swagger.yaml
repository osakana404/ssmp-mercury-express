openapi: 3.0.0
info:
  title: Mercury Express API
  version: 1.0.0
  description: API для управления новостями и складским учетом запчастей

paths:
  # --- СЕКЦИЯ НОВОСТЕЙ ---
  /news:
    get:
      summary: Получить список всех новостей
      tags:
        - News
      responses:
        200:
          description: Массив новостей с вложенными категориями и файлами
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/News"
    post:
      summary: Создать новую новость с файлами
      tags:
        - News
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - content
                - categoryId
              properties:
                title:
                  type: string
                  example: "Как настроить принтер"
                content:
                  type: string
                  example: "Подробная инструкция по шагам..."
                categoryId:
                  type: integer
                  example: 1
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        201:
          description: Новость успешно создана

  /news/{id}:
    get:
      summary: Получить одну новость по ID
      tags:
        - News
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Объект новости
        404:
          description: Новость не найдена

  # --- СЕКЦИЯ ЗАПЧАСТЕЙ ---
  /parts/prihod:
    post:
      summary: Оприходовать запчасть
      tags:
        - Parts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - quantity
                - price
              properties:
                name:
                  type: string
                  example: "Масляный фильтр"
                quantity:
                  type: integer
                  example: 10
                price:
                  type: number
                  example: 500
                description:
                  type: string
                  example: "Оригинальный фильтр"
      responses:
        201:
          description: Успешно оприходовано

  /parts/spisanie:
    post:
      summary: Списать запчасть на машину
      tags:
        - Parts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partId
                - carId
                - quantity
              properties:
                partId:
                  type: integer
                  example: 1
                carId:
                  type: integer
                  example: 1
                quantity:
                  type: integer
                  example: 1
      responses:
        201:
          description: Успешно списано
        400:
          description: Ошибка (например, недостаточно товара)

components:
  schemas:
    News:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        categoryId:
          type: integer
        Category:
          type: object
          properties:
            name:
              type: string
        Files:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              type:
                type: string

    Part:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
        description:
          type: string

    Transaction:
      type: object
      properties:
        id:
          type: integer
        partId:
          type: integer
        carId:
          type: integer
        quantity:
          type: integer
        type:
          type: string
        price:
          type: number
        date:
          type: string
          format: date-time
