openapi: 3.0.0
info:
  title: Mercury Express API
  version: 1.0.0
  description: API для управления новостями и профессиональным складским учетом (FIFO)

tags:
  - name: News
    description: Управление контентом
  - name: Parts
    description: Справочник запчастей
  - name: Categories
    description: Категории запчастей
  - name: Suppliers
    description: Справочник поставщиков
  - name: Supplies
    description: Приход товара (Накладные и партии)
  - name: Cars
    description: Справочник автомобилей
  - name: Reports
    description: Аналитика и остатки

paths:
  # --- НОВОСТИ (Оставлено без изменений) ---
  /news:
    get:
      summary: Получить список всех новостей
      tags: [News]
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/News"
    post:
      summary: Создать новость с файлами
      tags: [News]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
                categoryId: { type: integer }
                files: { type: array, items: { type: string, format: binary } }
      responses:
        201:
          description: Created

  # --- КАТЕГОРИИ ЗАПЧАСТЕЙ ---
  /categories:
    get:
      summary: Список категорий запчастей
      tags: [Categories]
      responses:
        200:
          description: OK
    post:
      summary: Создать категорию
      tags: [Categories]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "Ходовая" }
      responses:
        201:
          description: Created

  # --- ЗАПЧАСТИ (Справочник) ---
  /parts:
    get:
      summary: Все запчасти и их общие остатки
      tags: [Parts]
      responses:
        200:
          description: OK
    post:
      summary: Создать карточку запчасти
      tags: [Parts]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                categoryId: { type: integer }
                description: { type: string }
      responses:
        201:
          description: Created

  /parts/disburse:
    post:
      summary: Списание запчасти (FIFO) на машину
      tags: [Parts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [partId, carId, quantity]
              properties:
                partId: { type: integer }
                carId: { type: integer }
                quantity: { type: integer }
      responses:
        201:
          description: Успешное списание по FIFO
        400:
          description: Недостаточно товара или неверные ID

  # --- ПОСТАВКИ (Приход) ---
  /supplies:
    post:
      summary: Оформить приход (Накладная + Партии)
      tags: [Supplies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplierId, items]
              properties:
                supplierId: { type: integer }
                docNumber: { type: string, example: "INV-100" }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      partId: { type: integer }
                      quantity: { type: integer }
                      price: { type: number }
      responses:
        201:
          description: Накладная создана, партии добавлены

  # --- МАШИНЫ ---
  /cars:
    get:
      summary: Список всех машин
      tags: [Cars]
    post:
      summary: Добавить машину
      tags: [Cars]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Car"

  # --- ОТЧЕТЫ ---
  /reports/inventory:
    get:
      summary: Отчет по остаткам и стоимости склада
      tags: [Reports]
      responses:
        200:
          description: JSON с общей суммой и детализацией по каждой запчасти

  /reports/car/{carId}:
    get:
      summary: История расходов на конкретную машину
      tags: [Reports]
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200:
          description: Список всех списаний для данного авто

components:
  schemas:
    News:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        content: { type: string }
        Files:
          type: array
          items:
            type: object
            properties:
              url: { type: string }

    Car:
      type: object
      properties:
        id: { type: integer }
        number: { type: string, example: "A001AA14" }
        model: { type: string, example: "KAMAZ" }
        status: { type: string, example: "в работе" }

    Batch:
      type: object
      properties:
        id: { type: integer }
        partId: { type: integer }
        currentQuantity: { type: integer }
        price: { type: number }
        status: { type: string, example: "active" }
