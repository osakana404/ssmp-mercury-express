openapi: 3.0.0
info:
  title: Mercury Express API
  version: 1.2.0
  description: API для управления новостями и профессиональным складским учетом (FIFO, Партии, Транзакции, Отчеты)

tags:
  - name: News
    description: Управление контентом и файлами
  - name: Parts
    description: Справочник запчастей и списание
  - name: Categories
    description: Категории запчастей
  - name: Suppliers
    description: Справочник поставщиков
  - name: Supplies
    description: Приход товара (Накладные)
  - name: Batches
    description: Управление конкретными партиями товара
  - name: Transactions
    description: Журнал всех операций (аудит движений)
  - name: Cars
    description: Справочник автомобилей
  - name: Reports
    description: Аналитика, остатки и история расходов

paths:
  # --- НОВОСТИ ---
  /news:
    get:
      summary: Список всех новостей
      tags: [News]
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/News" }
    post:
      summary: Создать новость с файлами
      tags: [News]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title: { type: string }
                content: { type: string }
                categoryId: { type: integer }
                files: { type: array, items: { type: string, format: binary } }
      responses:
        201: { description: Created }

  # --- ЗАПЧАСТИ ---
  /parts:
    get:
      summary: Все запчасти и их общие остатки
      tags: [Parts]
      responses:
        200: { description: OK }
    post:
      summary: Создать карточку запчасти
      tags: [Parts]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                categoryId: { type: integer }
                description: { type: string }
      responses:
        201: { description: Created }

  /parts/disburse:
    post:
      summary: Списание запчасти (FIFO) на машину
      tags: [Parts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [partId, carId, quantity]
              properties:
                partId: { type: integer }
                carId: { type: integer }
                quantity: { type: integer }
                comment: { type: string }
      responses:
        201: { description: Успешное списание }
        400: { description: Недостаточно товара }

  # --- ПАРТИИ (BATCHES) ---
  /batches:
    get:
      summary: Список всех партий (архив)
      tags: [Batches]
      responses:
        200: { description: OK }

  /batches/active:
    get:
      summary: Список партий, которые сейчас в наличии
      tags: [Batches]
      responses:
        200: { description: OK }

  # --- ПРИХОД (SUPPLIES) ---
  /supplies:
    get:
      summary: История всех накладных
      tags: [Supplies]
      responses:
        200: { description: OK }
    post:
      summary: Оформить новый приход
      tags: [Supplies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplierId, items]
              properties:
                supplierId: { type: integer }
                docNumber: { type: string }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      partId: { type: integer }
                      quantity: { type: integer }
                      price: { type: number }
      responses:
        201: { description: Накладная и партии созданы }

  # --- ТРАНЗАКЦИИ (ЖУРНАЛ ОПЕРАЦИЙ) ---
  /transactions:
    get:
      summary: Получить полный журнал всех движений (приходы и списания)
      tags: [Transactions]
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Transaction" }

  # --- ОТЧЕТЫ ---
  /reports/inventory:
    get:
      summary: Общая стоимость склада и остатки
      tags: [Reports]
      responses:
        200: { description: OK }

  /reports/car/{carId}:
    get:
      summary: Сколько денег потрачено на конкретную машину
      tags: [Reports]
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: OK }

components:
  schemas:
    News:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        content: { type: string }
        Files:
          type: array
          items:
            type: object
            properties:
              url: { type: string }

    Car:
      type: object
      properties:
        id: { type: integer }
        number: { type: string }
        model: { type: string }
        status: { type: string }

    Batch:
      type: object
      properties:
        id: { type: integer }
        partId: { type: integer }
        currentQuantity: { type: integer }
        price: { type: number }
        status: { type: string, enum: [active, empty] }

    Transaction:
      type: object
      properties:
        id: { type: integer }
        partId: { type: integer }
        carId: { type: integer, nullable: true }
        supplyId: { type: integer, nullable: true }
        type: { type: string, enum: [приход, списание] }
        quantity: { type: integer }
        price: { type: number }
        sum: { type: number }
        date: { type: string, format: date-time }
        comment: { type: string, nullable: true }
        Part:
          type: object
          properties:
            name: { type: string }
        Car:
          type: object
          nullable: true
          properties:
            number: { type: string }
            model: { type: string }
        supply:
          type: object
          nullable: true
          properties:
            docNumber: { type: string }
